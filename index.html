    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#b539e6',
              secondary: '#6200ee',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .gradient-text {
        background: linear-gradient(90deg, #b539e6 0%, #6200ee 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .card-shadow {
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
      }
      .material-symbols-rounded {
        font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 28;
      }
      
      /* Smooth Scroll Effects */
      .scroll-section {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }
      
      .scroll-section.visible {
        opacity: 1;
        transform: translateY(0);
      }
      
      .scroll-section.stagger-1 { transition-delay: 0.1s; }
      .scroll-section.stagger-2 { transition-delay: 0.2s; }
      .scroll-section.stagger-3 { transition-delay: 0.3s; }
      .scroll-section.stagger-4 { transition-delay: 0.4s; }
      
      /* Infinite Carousel Animation - Marquee Style */
      .carousel-track {
        display: flex;
        width: fit-content;
      }
      
      .carousel-group {
        display: flex;
        gap: 0.75rem;
        padding-right: 0.75rem;
        flex-shrink: 0;
      }
      
      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      
      .animate-scroll {
        animation: marquee 15s linear infinite;
      }
      
      /* Hide scrollbar styles */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      
          </style>
